<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0"/>
    <title>Отслеживание посылки — Dostaffkin</title>

    <link rel="stylesheet" href="styles/base.css"/>
    <link rel="stylesheet" href="styles/base_adaptive.css"/>

    <link rel="stylesheet" href="styles/track.css"/>
    <link rel="stylesheet" href="styles/track_adaptive.css"/>
</head>
<body>

    <div id="map"></div>

    <header class="header">
        <a class="header-brand" href="./index.html">
            <div class="header-logo">D</div>
            <div class="header-title">Dostaffkin</div>
        </a>
        <nav class="header-menu">
            <a class="header-link" href="./order.html">Оформить <span>доставку</span></a>
            <a class="header-link" href="./track.html">Отследить <span>посылку</span></a>
        </nav>
    </header>

    <aside class="main" id="sidebar">

        <div class="main-header">
            <div class="main-title">Отслеживание посылки</div>
            <div class="main-text">Введите номер отправления для отслеживания</div>
        </div>

        <div class="main-content">

            <div class="main-track">
                <div class="main-block-title">Номер отправления</div>
                <div class="main-field">
                    <input id="trackId" placeholder="Введите номер отправления" autocomplete="off"/>
                </div>
                <button id="trackBtn" class="button track-button" type="button">Отследить</button>
            </div>

            <div class="main-result" id="trackResult">
                <div class="main-result-title">Информация о посылке</div>
                <div class="main-result-lines">
                    <div class="main-result-line"><span>Статус</span><span id="trackStatus">—</span></div>
                    <div class="main-result-line"><span>Откуда</span><span id="trackFrom">—</span></div>
                    <div class="main-result-line"><span>Куда</span><span id="trackTo">—</span></div>
                    <div class="main-result-line"><span>Расстояние</span><span id="trackDistance">—</span></div>
                    <div class="main-result-line"><span>Ожидаемое время</span><span id="trackDuration">—</span></div>
                </div>
            </div>

        </div>

    </aside>

</body>
</html>
